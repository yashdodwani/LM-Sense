# render.yaml — Infrastructure as Code for Render deployment
# Defines the full LM-Sense stack: frontend, backend, celery worker, postgres, and redis.

services:
  # ── Web Frontend (Next.js) ──────────────────────────────────────────────────
  - type: web
    name: lmsense-web
    env: node
    buildCommand: "cd apps/web && npm ci && npm run build"
    startCommand: "cd apps/web && npm start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: lmsense-api
          property: host
          # We prefix with https:// since Render hosts are secure by default
          # Actually, Render `host` property just gives the domain, so:
          # Actually let's just use the direct URL pattern.
      - key: NEXT_PUBLIC_API_URL
        # In Render, we can use a sync environment variable or we just set it manually. 
        # But for Render Blueprint, we can reference the other service's URL.
        value: "https://lmsense-api.onrender.com" # update if your API name changes
    region: ohio

  # ── API Gateway (FastAPI) ───────────────────────────────────────────────────
  - type: web
    name: lmsense-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: ohio
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lmsense-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lmsense-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: lmsense-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: lmsense-redis
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false # Set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false # Set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false # Set manually in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false # Set manually in Render dashboard
      - key: REWARD_MODEL
        value: "minimax/minimax-m2.5:free"
      - key: JWT_SECRET_KEY
        generateValue: true

  # ── Celery Worker ───────────────────────────────────────────────────────────
  - type: worker
    name: lmsense-worker
    env: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: "celery -A services.api_gateway.celery_app worker --loglevel=info"
    plan: starter
    region: ohio
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lmsense-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lmsense-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: lmsense-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: lmsense-redis
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # ── Redis (Background jobs & caching) ───────────────────────────────────────
  - type: redis
    name: lmsense-redis
    plan: free
    region: ohio
    ipAllowList: []

databases:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  - name: lmsense-db
    plan: free
    region: ohio
