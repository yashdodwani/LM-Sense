version: "3.8"
services:
  api-gateway:
    build: .
    ports:
      - "8000:8000"
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: db
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  celery-worker:
    build: .
    command: celery -A services.audit_logger.worker worker --loglevel=info
  flower:
    build: .
    command: celery -A services.audit_logger.worker flower --port=5555
    ports:
      - "5555:5555"
